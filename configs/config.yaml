project:
  name: "VN30 Long-Only ML Forecasting Framework"

data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  sample_path: "sample_data/sample_ohlcv.csv"
  index_ticker: "VN30"

backtest:
  start_date: "2015-01-01"
  end_date: "2026-07-15"
  rebalance_frequency: "W"
  prediction_horizon_days: 5

portfolio:
  long_only: true
  max_weight_per_stock: 0.10
  max_turnover: 0.30
  cash_allowed: true

transaction_cost:
  commission_bps: 15
  slippage_bps: 20

price_limit:
  hose_daily_limit: 0.07
  block_buy_at_ceiling: true
  block_sell_at_floor: true

model:
  target: "forward_relative_return_5d"
  main_metric: "spearman_ic"