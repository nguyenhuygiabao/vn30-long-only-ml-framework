version: 1

account:
  account_id: vn30-paper
  currency: VND
  initial_cash_vnd: 100000000

timing:
  timezone: Asia/Ho_Chi_Minh
  earliest_data_update_time: "15:15"
  require_completed_market_day: true
  signal_horizon_trading_days: 10
  rebalance_frequency_trading_days: 5
  execution_delay_trading_days: 1
  execution_price_source: next_open
  execution_submission_cutoff_time: "08:45"

market_calendar:
  holiday_dates: []

market_data:
  price_multiplier_to_vnd: 1000

data_update:
  source: KBS
  overlap_calendar_days: 14
  request_interval_seconds: 4
  max_attempts: 3
  overlap_close_tolerance: 0.05
  suspicious_return_threshold: 0.15
  audit_path: data/raw/vnstock/daily_update_audit.csv

portfolio:
  target_holdings: 8
  target_invested_weight: 0.97
  cash_buffer_weight: 0.03
  max_single_name_weight: 0.15
  max_issuer_group_weight: 0.25
  max_sector_weight: 0.35
  max_daily_turnover: 0.25

execution:
  round_lot_size: 100
  allow_odd_lots: false
  min_trade_value_vnd: 500000
  adv_lookback_trading_days: 20
  max_trade_adv_fraction: 0.05
  commission_rate: 0.001
  slippage_rate: 0.001
  sell_tax_rate: 0.001
  block_buy_at_ceiling: true
  block_sell_at_floor: true

settlement:
  cycle: T+2
  lag_trading_days: 2
  availability_time: "13:00"
  allow_unsettled_sale_proceeds_for_buys: false
  allow_unsettled_bought_shares_for_sales: false

model:
  model_name: gradient_boosting
  predictions_path: data/processed/tree_model_predictions.parquet
  universe_path: config/vn30_universe.csv
  raw_ohlcv_path: data/raw/vnstock/vn30_ohlcv.csv

output:
  directory: paper_trading
